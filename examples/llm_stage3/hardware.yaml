hardware:
  name: legend-llm-chip-v2
  sram:
    size_bytes: 4194304
    banks: 16
    bank_width_bytes: 64
  dma:
    bandwidth_gbps: 512
    max_request_bytes: 65536
    supports_async: true
    supports_2d: true
  compute:
    rows: 64
    cols: 64
    supported_dtypes: [bf16, fp16, int8, f32]
    native_mma_m: 16
    native_mma_n: 16
    native_mma_k: 32
  supports_kv_cache: true
  supports_fused_epilogue: true
  supports_prefill_decode_split: true
