compile:
  model_name: qwen3-14b
  architecture: qwen3
  kernel_name: qwen3_prefill
  mode: prefill
  match_op: linalg.batch_matmul
  dtype: bf16
  batch_size: 1
  seq_len: 4096
  num_heads: 40
  head_dim: 128
  hidden_size: 5120
  kv_cache: false
  op_chain: [linalg.batch_matmul, linalg.generic, linalg.generic]
  outline_function: qwen3_prefill_kernel
  tags: [attention, swiglu, rope]
  inputs:
    - {name: hidden_states, dtype: bf16, shape: [1, 4096, 5120], layout: row-major, role: activation}
    - {name: w_qkv, dtype: bf16, shape: [5120, 15360], layout: row-major, role: weight}
  outputs:
    - {name: qkv_out, dtype: bf16, shape: [1, 4096, 15360], layout: row-major, role: activation}
