compile:
  model_name: llama3-8b
  architecture: llama
  kernel_name: llama_prefill
  mode: prefill
  match_op: linalg.batch_matmul
  dtype: bf16
  batch_size: 1
  seq_len: 2048
  num_heads: 32
  head_dim: 128
  hidden_size: 4096
  kv_cache: false
  op_chain: [linalg.batch_matmul, linalg.generic, linalg.generic]
  outline_function: llama_prefill_kernel
  tags: [attention, rope]
  inputs:
    - {name: hidden_states, dtype: bf16, shape: [1, 2048, 4096], layout: row-major, role: activation}
    - {name: w_qkv, dtype: bf16, shape: [4096, 12288], layout: row-major, role: weight}
  outputs:
    - {name: qkv_out, dtype: bf16, shape: [1, 2048, 12288], layout: row-major, role: activation}
